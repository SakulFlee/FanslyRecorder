when:
  event: [push, tag, manual]
  branch: main

steps:
  build-and-push:
    image: nixos/nix:latest
    commands:
      - nix build .#dockerImage --accept-flake-config --extra-experimental-features 'nix-command flakes'
      - docker load < result
      - docker tag fansly-recorder forgejo.sakul-flee.de/sakulflee/fansly-recorder:${CI_COMMIT_TAG:-latest}
      - echo "$FORGEJO_PASSWORD" | docker login forgejo.sakul-flee.de -u "$FORGEJO_USERNAME" --password-stdin
      - docker push forgejo.sakul-flee.de/sakulflee/fansly-recorder:${CI_COMMIT_TAG:-latest}
    environment:
      FORGEJO_USERNAME:
        from_secret: FORGEJO_USERNAME
      FORGEJO_PASSWORD:
        from_secret: FORGEJO_PASSWORD
