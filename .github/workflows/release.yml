name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  binary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install pyinstaller playwright
      - run: pyinstaller --onefile --name fansly-recorder main.py
      - run: gh release create "${{ github.ref_name }}" dist/fansly-recorder --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
