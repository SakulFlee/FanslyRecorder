name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
      - run: nix build .#dockerImage --fallback --extra-experimental-features 'nix-command flakes'
      - run: docker load < result
      - run: docker tag fansly-recorder ghcr.io/sakulflee/fansly-recorder:${{ github.ref_name }}
      - run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
      - run: docker push ghcr.io/sakulflee/fansly-recorder:${{ github.ref_name }}
